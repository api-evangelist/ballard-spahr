aid: ballard-spahr
name: Ballard Spahr
description: >-
  Ballard Spahr LLP is a national U.S. law firm founded in 1885 and headquartered
  in Philadelphia. Following its January 1, 2025 combination with Seattle-based
  Lane Powell, the firm operates as a "nationally recognized firm of more than
  750 lawyers across 18 U.S. offices" with departments in Business and
  Transactions, Finance, Intellectual Property, Litigation, and Real Estate.
  The firm has historic depth in consumer financial services, real estate,
  public finance, and IP, and runs widely read thought-leadership properties
  including the Consumer Finance Monitor blog (with public RSS feed) and the
  Business Better podcast. Ballard Spahr does not expose any public developer
  API, SDK, OpenAPI spec, or developer portal — its only machine-readable
  surface is the Consumer Finance Monitor RSS feed.
